<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Semicolon</title>
    <meta id="article-meta-description" name="description"
        content="Read concept-first engineering articles mapped to real-world software systems.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/article.css">
</head>

<body>
    <div class="background-glow"></div>

    <header class="glass-nav">
        <div class="container">
            <div class="brand-container">
                <a href="../index.html" style="text-decoration:none">
                    <h1 class="logo-title">Semicolon<span class="logo-icon">;</span></h1>
                </a>
                <p class="tagline">Where every line of code tells a story</p>
            </div>
            <nav class="nav-menu" id="nav-menu">
                <ul class="nav-links">
                    <li><a href="../index.html" class="nav-link">Home</a></li>
                    <li><a href="problems.html" class="nav-link">Problems</a></li>
                    <li><a href="read.html" class="nav-link">Read</a></li>
                    <li><a href="../index.html#about" class="nav-link">About</a></li>
                </ul>
            </nav>
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </header>

    <main class="article-main">
        <div class="container article-wrap">
            <a class="article-back-link" href="read.html"><i class="fa-solid fa-arrow-left"></i> Back to Read</a>

            <article id="article-shell" class="article-shell glass-card">
                <div class="article-head">
                    <div class="article-meta-row">
                        <span id="article-domain" class="article-domain">Loading...</span>
                        <span id="article-time" class="article-time"><i class="fa-regular fa-clock"></i></span>
                    </div>
                    <h1 id="article-title" class="article-title">Loading article...</h1>
                </div>
                <div id="article-body" class="article-body"></div>
                <div id="article-cta-row" class="article-cta-row"></div>
            </article>

            <div id="article-not-found" class="article-not-found" style="display:none;">
                <h2>Article Not Found</h2>
                <p>The requested article does not exist.</p>
                <a href="read.html" class="article-link-btn"><i class="fa-solid fa-book-open-reader"></i> Open Read
                    Library</a>
            </div>
        </div>
    </main>

    <script src="../js/script.js"></script>
    <script src="../js/article.js"></script>
</body>

</html>
